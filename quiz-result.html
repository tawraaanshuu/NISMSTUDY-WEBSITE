<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Result - NISMSTUDY.COM</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { background:#f8fafc; }
    .page { max-width:900px; margin:0 auto; padding:24px 16px 40px; }
    .card { background:#fff; border-radius:20px; box-shadow:0 16px 40px rgba(15,23,42,.06); padding:24px; }
    .row { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; margin-top:18px; }
    .item { background:#f8fafc; border:1px solid #e2e8f0; border-radius:16px; padding:16px; }
    .value { font-size:28px; font-weight:800; color:#0f172a; }
    .label { color:#64748b; font-size:13px; }
    .actions { display:flex; flex-wrap:wrap; gap:12px; margin-top:18px; }
    .btn { display:inline-flex; align-items:center; justify-content:center; border:0; border-radius:12px; padding:12px 16px; font-weight:700; text-decoration:none; cursor:pointer; }
    .btn-primary { background:#2563eb; color:#fff; }
    .btn-secondary { background:#e2e8f0; color:#0f172a; }
    .message { margin-bottom:16px; padding:14px 16px; border-radius:14px; font-size:14px; }
    .message.error { background:#fef2f2; color:#b91c1c; }
    @media (max-width: 900px) { .row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="page">
    <div id="messageBox" class="message error" style="display:none;"></div>
    <div class="card">
      <div class="label">Exam Result</div>
      <h1 id="quizTitle" style="margin:6px 0 8px;">Loading result…</h1>
      <p id="courseTitle" style="margin:0;color:#475569;">Please wait while we load your result from Supabase.</p>

      <div class="row">
        <div class="item"><div class="label">Score</div><div class="value" id="scoreValue">—</div></div>
        <div class="item"><div class="label">Answered</div><div class="value" id="answeredValue">—</div></div>
        <div class="item"><div class="label">Status</div><div class="value" id="statusValue">—</div></div>
      </div>

      <div class="row">
        <div class="item"><div class="label">Questions</div><div class="value" id="questionCountValue">—</div></div>
        <div class="item"><div class="label">Max Marks</div><div class="value" id="maxMarksValue">—</div></div>
        <div class="item"><div class="label">Violations</div><div class="value" id="violationValue">—</div></div>
      </div>

      <div class="actions">
        <a id="backToCourse" class="btn btn-secondary" href="/">Back to Course</a>
        <a id="retakeLink" class="btn btn-primary" href="/">Retake Exam</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <script src="/quiz-result.js"></script>
</body>
</html>
