<!-- 
  AI CHATBOT WIDGET - NISMSTUDY.COM
  
  INTEGRATION INSTRUCTIONS:
  1. Copy this entire file content
  2. Paste it before the closing </body> tag in your HTML pages
  3. Make sure your server has the chat routes configured
  4. That's it! The chatbot will appear on your page.
  
  Files needed:
  - /api/chat route (backend)
  - /chatbot-styles.css (frontend)
  - /chatbot.js (frontend)
-->

<!-- Chat Widget Container -->
<div class="chat-widget">
  <!-- Chat Button -->
  <button class="chat-button" id="chatButton" aria-label="Open chat">
    <!-- Chat Icon (shown when closed) -->
    <svg class="icon-chat" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
      <path d="M7 9h10v2H7zm0-3h10v2H7zm0 6h7v2H7z"/>
    </svg>
    <!-- Close Icon (shown when open) -->
    <svg class="icon-close" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
    </svg>
    <!-- Notification Badge (optional) -->
    <span class="notification-badge" id="notificationBadge" style="display: none;">1</span>
  </button>

  <!-- Chat Window -->
  <div class="chat-window" id="chatWindow">
    <!-- Chat Header -->
    <div class="chat-header">
      <div class="chat-header-avatar">🤖</div>
      <div class="chat-header-info">
        <h3>NISM Study Assistant</h3>
        <p>
          <span class="chat-header-status"></span>
          Online - We reply instantly
        </p>
      </div>
    </div>

    <!-- Quick Questions -->
    <div class="quick-questions" id="quickQuestions">
      <button class="quick-question-btn" data-question="What courses do you offer?">📚 Courses</button>
      <button class="quick-question-btn" data-question="How do I register?">✍️ Register</button>
      <button class="quick-question-btn" data-question="What payment methods do you accept?">💳 Payment</button>
      <button class="quick-question-btn" data-question="Do you provide mock tests?">📝 Mock Tests</button>
      <button class="quick-question-btn" data-question="What is your refund policy?">↩️ Refund</button>
    </div>

    <!-- Chat Messages Area -->
    <div class="chat-messages" id="chatMessages">
      <div class="welcome-message">
        <h4>👋 Welcome to NISMSTUDY!</h4>
        <p>Hi! I'm your AI assistant. Ask me anything about NISM certifications, courses, exams, or our platform.</p>
      </div>
    </div>

    <!-- Chat Input -->
    <div class="chat-input">
      <input 
        type="text" 
        id="chatInput" 
        placeholder="Type your question here..." 
        autocomplete="off"
        aria-label="Type your message"
      />
      <button id="sendButton" aria-label="Send message">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Load Chatbot Styles -->
<link rel="stylesheet" href="/chatbot-styles.css">

<!-- Load Chatbot JavaScript -->
<script src="/chatbot.js"></script>

<!-- 
  CUSTOMIZATION OPTIONS:
  
  1. Change Colors:
     Edit the CSS variables in chatbot-styles.css
  
  2. Change Avatar:
     Replace the 🤖 emoji in chat-header-avatar with your own icon/image
  
  3. Change Title:
     Edit "NISM Study Assistant" to your preferred title
  
  4. Add/Remove Quick Questions:
     Add or remove quick-question-btn buttons above
  
  5. Customize Welcome Message:
     Edit the welcome-message div content
-->
