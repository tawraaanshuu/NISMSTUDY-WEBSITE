<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - NISMSTUDY.COM</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { background:#f7f9fc; }
    .auth-wrap { max-width:420px; margin:60px auto; background:#fff; padding:32px; border-radius:18px; box-shadow:0 16px 40px rgba(15,23,42,.08); }
    .auth-wrap h1 { margin-bottom:8px; }
    .auth-wrap p { color:#64748b; margin-bottom:24px; }
    .auth-wrap label { display:block; margin:14px 0 6px; font-weight:600; }
    .auth-wrap input { width:100%; padding:12px 14px; border:1px solid #cbd5e1; border-radius:10px; font-size:15px; }
    .auth-wrap button { width:100%; margin-top:18px; padding:12px 14px; border:0; border-radius:10px; background:#2563eb; color:#fff; font-weight:700; cursor:pointer; }
    .auth-wrap .muted { margin-top:14px; font-size:14px; }
    .auth-wrap .error { color:#dc2626; min-height:22px; margin-top:12px; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <h1>Welcome Back</h1>
    <p>Sign in with your Supabase account.</p>
    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" type="email" required />
      <label for="password">Password</label>
      <input id="password" type="password" required />
      <div id="authError" class="error"></div>
      <button id="submitBtn" type="submit">Sign In</button>
    </form>
    <p class="muted">Don't have an account? <a href="/register.html">Create one</a></p>
    <p class="muted"><a href="/">← Back to Website</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <script src="/auth.js"></script>
</body>
</html>
